<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juntar PDFs Online</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

.upload-box{
    margin-bottom:20px;
}

input[type=file]{
    width:100%;
    padding:15px;
    border:2px dashed #ccc;
    border-radius:10px;
    cursor:pointer;
}

ul{
    list-style:none;
    margin-bottom:20px;
}

li{
    background:#f0f0f0;
    padding:12px;
    margin-bottom:8px;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#0066ff;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#004ecc;
}

#status{
    margin-top:20px;
    text-align:center;
    font-weight:bold;
    color:#333;
}
</style>

</head>
<body>

<div class="container">

    <h1>📄 Juntar PDFs</h1>

    <div class="upload-box">
        <input type="file" id="pdfFiles" multiple accept=".pdf">
    </div>

    <ul id="fileList"></ul>

    <button id="mergeBtn">Juntar PDFs</button>

    <div id="status"></div>

</div>

<script>
const fileInput = document.getElementById('pdfFiles');
const fileList = document.getElementById('fileList');
const mergeBtn = document.getElementById('mergeBtn');
const statusDiv = document.getElementById('status');

let files = [];

fileInput.addEventListener('change', () => {

    files = [...fileInput.files];

    fileList.innerHTML = '';

    files.forEach((file, index) => {

        const li = document.createElement('li');
        li.textContent = `${index + 1}. ${file.name}`;

        fileList.appendChild(li);
    });
});

mergeBtn.addEventListener('click', async () => {

    if(files.length < 2){
        alert('Selecione pelo menos 2 PDFs.');
        return;
    }

    try{

        statusDiv.innerText = 'Processando PDFs...';

        const mergedPdf = await PDFLib.PDFDocument.create();

        for(const file of files){

            const fileBytes = await file.arrayBuffer();

            const pdf = await PDFLib.PDFDocument.load(fileBytes);

            const pages = await mergedPdf.copyPages(
                pdf,
                pdf.getPageIndices()
            );

            pages.forEach(page => {
                mergedPdf.addPage(page);
            });
        }

        const mergedPdfFile = await mergedPdf.save();

        const blob = new Blob(
            [mergedPdfFile],
            { type:'application/pdf' }
        );

        const url = URL.createObjectURL(blob);

        const link = document.createElement('a');
        link.href = url;
        link.download = 'pdf-unificado.pdf';

        document.body.appendChild(link);
        link.click();
        link.remove();

        URL.revokeObjectURL(url);

        statusDiv.innerText = '✅ PDF gerado com sucesso!';

    }catch(error){

        console.error(error);
        statusDiv.innerText = '❌ Erro ao juntar os PDFs.';
    }
});
</script>

</body>
</html>
